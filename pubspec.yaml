name: construction_erp
description: Local-first Construction ERP for Android and Windows.
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.6.0
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  drift: ^2.23.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_storage: ^13.4.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  google_sign_in: ^7.2.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.27
  uuid: ^4.5.1
  pdf: ^3.12.0
  excel: ^4.0.6
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.0

flutter:
  uses-material-design: true
